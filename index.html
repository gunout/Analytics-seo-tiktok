<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TikTok Analytics Pro | DONNÉES RÉELLES</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0c10 0%, #111318 100%);
            font-family: 'Inter', sans-serif;
            color: #f0f3fa;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(0, 255, 170, 0.12);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.2rem;
            border-radius: 100px;
            border: 1px solid rgba(0, 255, 170, 0.3);
            margin-bottom: 1.2rem;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .real-badge {
            background: rgba(72, 187, 120, 0.2);
            border-color: #48bb78;
        }
        
        .badge i {
            color: #0fa;
        }
        
        h1 {
            font-family: 'Space Grotesk', monospace;
            font-size: 2.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF 20%, #9effcf 70%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
        }
        
        .sub {
            color: #8f9bb3;
            margin-top: 0.8rem;
            font-size: 1rem;
        }

        .search-panel {
            background: rgba(18, 22, 35, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(72, 187, 150, 0.2);
            padding: 1.2rem 1.8rem;
            margin-bottom: 2.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }
        
        .input-group {
            flex: 3;
            min-width: 240px;
            position: relative;
        }
        
        .input-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #5f7f6e;
            font-size: 1.2rem;
        }
        
        input {
            width: 100%;
            background: #0b0e16;
            border: 1px solid #2a2f3f;
            padding: 1rem 1rem 1rem 3rem;
            border-radius: 2rem;
            font-size: 1rem;
            color: #eef4ff;
            outline: none;
        }
        
        input:focus {
            border-color: #2dd4bf;
            box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.2);
        }
        
        button {
            background: linear-gradient(95deg, #14b8a6, #0d9488);
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: transform 0.15s;
        }
        
        button:hover {
            transform: translateY(-2px);
            background: linear-gradient(95deg, #1fcfbb, #10b981);
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }
        
        .card {
            background: rgba(15, 19, 30, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 1.8rem;
            border: 1px solid rgba(48, 60, 80, 0.5);
            padding: 1.5rem 1.6rem;
        }
        
        .card-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            border-bottom: 1px dashed rgba(69, 202, 165, 0.4);
            padding-bottom: 0.9rem;
            margin-bottom: 1.4rem;
        }
        
        .card-header i {
            font-size: 1.7rem;
            color: #2dd4bf;
        }
        
        .card-header h3 {
            font-weight: 600;
            font-size: 1.3rem;
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
        }
        
        .metric-label {
            color: #9ca3cf;
        }
        
        .metric-value {
            font-weight: 700;
            font-size: 1.2rem;
            color: #f0f4ff;
        }
        
        .progress-bar {
            background: #1e293b;
            border-radius: 40px;
            height: 8px;
            overflow: hidden;
            margin: 0.6rem 0;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #2dd4bf, #10b981);
            width: 0%;
            height: 100%;
            border-radius: 40px;
        }
        
        .score-circle {
            display: inline-block;
            font-weight: 800;
            font-size: 2rem;
            background: #0f172a;
            border-radius: 60px;
            padding: 0.2rem 0.8rem;
        }
        
        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-top: 1rem;
        }
        
        .tag {
            background: #1f2a3e;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #b9f3e8;
        }
        
        .loader {
            display: flex;
            justify-content: center;
            padding: 2rem;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #1e293b;
            border-top-color: #2dd4bf;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #3b1e2e;
            color: #ffb3c6;
            padding: 1rem;
            border-radius: 1.5rem;
            text-align: center;
            border: 1px solid #ff7b89;
        }
        
        .success-badge {
            background: #48bb7820;
            color: #48bb78;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 1rem;
        }
        
        .footer-note {
            text-align: center;
            font-size: 0.75rem;
            margin-top: 2.5rem;
            color: #4b556b;
            border-top: 1px solid #1e2a3a;
            padding-top: 1.8rem;
        }
        
        @media (max-width: 680px) {
            body { padding: 1rem; }
            h1 { font-size: 1.9rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="badge real-badge">
            <i class="fas fa-database"></i> <span>DONNÉES RÉELLES TIKTOK - LIVE</span>
        </div>
        <h1>TikTok Scope<span style="color:#2dd4bf;">®</span> Real</h1>
        <div class="sub">Audit SEO réel, engagement authentique & recommandations IA</div>
    </div>

    <div class="search-panel">
        <div class="input-group">
            <i class="fab fa-tiktok"></i>
            <input type="text" id="tiktokUserInput" placeholder="@username TikTok ex: @khaby.lame">
        </div>
        <button id="analyzeBtn"><i class="fas fa-microchip"></i> Analyse Données Réelles</button>
        <div class="example"><i class="fas fa-globe"></i> Données LIVE via TikTok API</div>
    </div>

    <div id="resultsArea">
        <div class="loader" id="loaderPlaceholder" style="display: none;">
            <div class="spinner"></div>
        </div>
        <div id="analyticsDashboard"></div>
    </div>
    <div class="footer-note">
        <i class="fas fa-chart-line"></i> Données RÉELLES récupérées en direct depuis TikTok • 
        <i class="fas fa-shield-alt"></i> API publique & scraping légal
    </div>
</div>

<script>
    const API_URL = 'http://localhost:3000/api/tiktok';
    
    async function getRealTikTokData(username) {
        try {
            const response = await fetch(`${API_URL}/${encodeURIComponent(username)}`);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            const data = await response.json();
            return data;
        } catch (error) {
            console.error('Erreur API:', error);
            return { 
                success: false, 
                error: `Erreur de connexion: ${error.message}. Vérifiez que le serveur Node.js est lancé (npm start)`
            };
        }
    }
    
    function extractUsername(input) {
        if (!input) return null;
        let clean = input.trim();
        const urlRegex = /(?:https?:\/\/)?(?:www\.)?tiktok\.com\/@([a-zA-Z0-9_.]+)/i;
        const matchUrl = clean.match(urlRegex);
        if (matchUrl && matchUrl[1]) return matchUrl[1];
        const atRegex = /^@?([a-zA-Z0-9_.]{2,30})$/;
        const matchAt = clean.match(atRegex);
        if (matchAt) return matchAt[1];
        if (/^[a-zA-Z0-9_.]{2,30}$/.test(clean)) return clean;
        return null;
    }
    
    function renderDashboard(data) {
        if (!data.success) {
            return `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> ${data.error || 'Erreur inconnue'}<br><small>Vérifiez le nom d'utilisateur ou réessayez.</small></div>`;
        }
        
        const engagementWidth = Math.min(100, parseFloat(data.engagementRate) * 5);
        const seoWidth = data.seoScore;
        const bioWidth = data.bioOptimization;
        
        const hashtags = ["#fyp", "#viral", "#tiktok", "#pourtoi", `#${data.username}`];
        const keywords = [data.niche?.toLowerCase() || "tiktok", "engagement", "viral content", "growth"];
        
        return `
            <div style="text-align:center; margin-bottom:1rem;">
                <span class="success-badge"><i class="fas fa-check-circle"></i> DONNÉES RÉELLES - ${data.source === 'real_tiktok_api' ? 'LIVE TikTok' : 'API Officielle'}</span>
            </div>
            <div class="dashboard">
                <div class="card">
                    <div class="card-header">
                        <i class="fab fa-tiktok"></i>
                        <h3>@${data.username} · Stats RÉELLES</h3>
                    </div>
                    <div class="metric"><span class="metric-label"><i class="fas fa-users"></i> Abonnés RÉELS</span><span class="metric-value">${data.followers.toLocaleString()}</span></div>
                    <div class="metric"><span class="metric-label"><i class="fas fa-chart-simple"></i> Taux d'engagement réel</span><span class="metric-value">${data.engagementRate}%</span></div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${engagementWidth}%;"></div></div>
                    <div class="metric"><span class="metric-label"><i class="fas fa-heart"></i> Total likes reçus</span><span class="metric-value">${data.hearts.toLocaleString()}</span></div>
                    <div class="metric"><span class="metric-label"><i class="fas fa-video"></i> Vidéos publiées</span><span class="metric-value">${data.videos}</span></div>
                    <div class="metric"><span class="metric-label"><i class="fas fa-user-plus"></i> Abonnements</span><span class="metric-value">${data.following.toLocaleString()}</span></div>
                    <hr style="border-color:#2a3346; margin:12px 0">
                    <div class="metric"><span class="metric-label">✅ Compte vérifié</span><span class="metric-value">${data.verified ? '✓ Oui' : '✗ Non'}</span></div>
                    <div class="metric"><span class="metric-label">🛡️ Force du compte</span><span class="metric-value">${data.accountStrength}</span></div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-chart-line"></i>
                        <h3>SEO PowerScore™ (Réel)</h3>
                    </div>
                    <div style="text-align:center; margin:0.5rem 0"><span class="score-circle">${data.seoScore}/100</span></div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${seoWidth}%;"></div></div>
                    <div class="metric"><span class="metric-label">🏷️ Optimisation Bio</span><span class="metric-value">${data.bioOptimization}%</span></div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${bioWidth}%; background:#3b82f6;"></div></div>
                    <div class="tag-cloud">
                        ${hashtags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                    <div style="margin-top:1rem; background:#0f172a; border-radius:0.8rem; padding:0.8rem;">
                        <i class="fas fa-quote-left" style="color:#2dd4bf;"></i> ${data.bio || 'Aucune bio'}
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-key"></i>
                        <h3>Keywords & Stratégie</h3>
                    </div>
                    <div class="hashtag-highlight"><i class="fas fa-bullseye"></i> Recommandations SEO :</div>
                    <div style="margin: 1rem 0 0.5rem 0; font-weight:500;">Mots-clés prioritaires :</div>
                    <div class="tag-cloud">
                        ${keywords.map(kw => `<span class="tag" style="background:#1e2c3b;"><i class="fas fa-hashtag"></i> ${kw}</span>`).join('')}
                    </div>
                    <div class="metric" style="margin-top:1rem;">
                        <span class="metric-label">📈 Potentiel viral</span>
                        <span class="metric-value">${data.engagementRate > 5 ? "🔥 Élevé" : (data.engagementRate > 2 ? "📊 Moyen" : "⚠️ À améliorer")}</span>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-list-check"></i>
                        <h3>SEO Action Plan (Basé données réelles)</h3>
                    </div>
                    <ul style="list-style-type: none; padding-left:0;">
                        <li style="margin-bottom: 0.8rem; display: flex; gap: 10px;">
                            <i class="fas fa-chevron-circle-right" style="color:#2dd4bf;"></i>
                            <span>${data.bio && data.bio.length < 80 ? "📝 Allongez votre bio (actuelle: " + data.bio.length + " caractères)" : "✅ Bio bien dimensionnée"}</span>
                        </li>
                        <li style="margin-bottom: 0.8rem; display: flex; gap: 10px;">
                            <i class="fas fa-chevron-circle-right" style="color:#2dd4bf;"></i>
                            <span>${data.videos < 30 ? "🎬 Publiez plus régulièrement (" + data.videos + " vidéos)" : "✅ Bon rythme de publication"}</span>
                        </li>
                        <li style="margin-bottom: 0.8rem; display: flex; gap: 10px;">
                            <i class="fas fa-chevron-circle-right" style="color:#2dd4bf;"></i>
                            <span>${data.engagementRate < 3 ? "💬 Interagissez plus avec votre communauté" : "🚀 Excellent engagement, continuez !"}</span>
                        </li>
                        <li style="margin-bottom: 0.8rem; display: flex; gap: 10px;">
                            <i class="fas fa-chevron-circle-right" style="color:#2dd4bf;"></i>
                            <span>🎵 Utilisez les sons tendance du moment</span>
                        </li>
                    </ul>
                    <div style="background:#0f172a; border-radius: 1rem; padding: 0.7rem;">
                        <i class="fas fa-lightbulb" style="color:#fbbf24;"></i> 
                        <strong>Astuce TikTok SEO :</strong> Publiez entre 18h et 21h pour maximiser l'engagement.
                    </div>
                </div>
            </div>
            <div style="margin-top: 1rem; background: rgba(0,0,0,0.3); border-radius: 1.2rem; padding: 0.8rem 1rem;">
                <span><i class="fas fa-chart-pie"></i> Score SEO réel: ${data.seoScore}/100 · @${data.username}</span>
                <span style="float:right;"><i class="fab fa-searchengin"></i> Analyse basée sur données LIVE TikTok</span>
            </div>
        `;
    }
    
    document.getElementById('analyzeBtn').addEventListener('click', async () => {
        const inputElem = document.getElementById('tiktokUserInput');
        const rawLink = inputElem.value;
        
        if (!rawLink.trim()) {
            document.getElementById('analyticsDashboard').innerHTML = `<div class="error-message"><i class="fas fa-info-circle"></i> Veuillez entrer un nom d'utilisateur TikTok.</div>`;
            return;
        }
        
        const username = extractUsername(rawLink);
        if (!username) {
            document.getElementById('analyticsDashboard').innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> Nom d'utilisateur invalide. Format: @khaby.lame</div>`;
            return;
        }
        
        const loaderDiv = document.getElementById('loaderPlaceholder');
        const dashboardDiv = document.getElementById('analyticsDashboard');
        loaderDiv.style.display = 'flex';
        dashboardDiv.innerHTML = '';
        
        const data = await getRealTikTokData(username);
        loaderDiv.style.display = 'none';
        
        if (data.success) {
            dashboardDiv.innerHTML = renderDashboard(data);
        } else {
            dashboardDiv.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> ${data.error || 'Erreur lors de la récupération des données'}<br><small>Vérifiez que le serveur Node.js est lancé (npm start)</small></div>`;
        }
    });
    
    window.addEventListener('DOMContentLoaded', () => {
        document.getElementById('tiktokUserInput').value = '@khaby.lame';
        document.getElementById('analyticsDashboard').innerHTML = `<div style="text-align:center; background: rgba(0,0,0,0.2); border-radius: 2rem; padding: 2rem;">
            <i class="fab fa-tiktok" style="font-size: 2rem; color:#2dd4bf;"></i>
            <p style="margin-top:0.7rem;">📊 Analyse TikTok avec données RÉELLES<br>Entrez @username et cliquez sur "Analyse Données Réelles"</p>
            <p style="font-size:0.8rem; margin-top:1rem;">⚠️ Assurez-vous que le serveur Node.js est lancé: <code>npm start</code></p>
        </div>`;
    });
</script>
</body>
</html>
